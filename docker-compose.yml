version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: nexusurl_postgres
    environment:
      POSTGRES_DB: nexusurl
      POSTGRES_USER: ${DB_USER:-nexususer}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-nexuspass123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "127.0.0.1:7002:5432"
    networks:
      - nexus_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-nexususer}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: nexusurl_redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - nexus_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexusurl_backend
    environment:
      NODE_ENV: production
      APP_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${DB_USER:-nexususer}:${DB_PASSWORD:-nexuspass123}@postgres:5432/nexusurl
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-this}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-your-super-secret-refresh-key}
      APP_URL: http://187.77.183.14:1590
      API_URL: http://187.77.183.14:7658/api
      EMAIL_HOST: ${EMAIL_HOST:-smtp.gmail.com}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USER: ${EMAIL_USER:-notifications@xus.me}
      EMAIL_PASS: ${EMAIL_PASS:-}
      TWO_FACTOR_SECRET: ${TWO_FACTOR_SECRET:-nexusurl_2fa_secret_2024}
      CORS_ORIGIN: http://187.77.183.14:1590
      SERVER_IP: 187.77.183.14
      DOMAIN: xus.me
      ENABLE_2FA: "true"
      ENABLE_EMAIL_NOTIFICATIONS: "true"
      ENABLE_QR_CODE: "true"
      PUBLIC_API_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "7658:3001"
      - "1156:3002"
    networks:
      - nexus_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: nexusurl_worker
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-nexususer}:${DB_PASSWORD:-nexuspass123}@postgres:5432/nexusurl
      REDIS_URL: redis://redis:6379
      EMAIL_HOST: ${EMAIL_HOST:-smtp.gmail.com}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USER: ${EMAIL_USER:-notifications@xus.me}
      EMAIL_PASS: ${EMAIL_PASS:-}
    depends_on:
      - postgres
      - redis
    networks:
      - nexus_network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nexusurl_frontend
    ports:
      - "1590:80"
    depends_on:
      - backend
    networks:
      - nexus_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  nexus_network:
    driver: bridge
